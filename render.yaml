services:
  - type: web
    name: ecofi-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: ORACLE_PRIVATE_KEY
        sync: false
      - key: CONTRACT_ADDRESS
        sync: false
